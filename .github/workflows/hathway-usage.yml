name: Hathway Usage

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: hathway-usage
  cancel-in-progress: false

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Hathway secrets
        env:
          HATHWAY_AUTHORIZATION: ${{ secrets.HATHWAY_AUTHORIZATION }}
          HATHWAY_ACCOUNT_NO: ${{ secrets.HATHWAY_ACCOUNT_NO }}
          HATHWAY_REGISTERED_MOBILE_NO: ${{ secrets.HATHWAY_REGISTERED_MOBILE_NO }}
        run: |
          if [ -z "$HATHWAY_AUTHORIZATION" ]; then
            echo "::error::Missing secret: set HATHWAY_AUTHORIZATION"
            exit 1
          fi
          if [ -z "$HATHWAY_ACCOUNT_NO" ]; then
            echo "::error::Missing secret: set HATHWAY_ACCOUNT_NO"
            exit 1
          fi
          if [ -z "$HATHWAY_REGISTERED_MOBILE_NO" ]; then
            echo "::error::Missing secret: set HATHWAY_REGISTERED_MOBILE_NO"
            exit 1
          fi

      - name: Fetch Hathway usage
        env:
          HATHWAY_AUTHORIZATION: ${{ secrets.HATHWAY_AUTHORIZATION }}
          HATHWAY_ACCOUNT_NO: ${{ secrets.HATHWAY_ACCOUNT_NO }}
          HATHWAY_REGISTERED_MOBILE_NO: ${{ secrets.HATHWAY_REGISTERED_MOBILE_NO }}
          HATHWAY_LOGIN_DEVICE: web
          HATHWAY_TIMEZONE: Asia/Kolkata
          HATHWAY_DATE_MODE: year-to-now
          USAGE_RANGE_MODE: year-to-now
        run: python scripts/hathway_usage.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/broadband_usage.json outputs/broadband_usage.html
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "Update broadband usage dashboard"
            git push
          fi

      - name: Prepare dashboard artifact
        run: |
          mkdir -p public
          cp outputs/broadband_usage.html public/index.html
          cp outputs/broadband_usage.json public/broadband_usage.json

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: broadband-dashboard
          path: public

      - name: Configure Pages
        if: ${{ !github.event.repository.private }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ !github.event.repository.private }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: ${{ !github.event.repository.private }}
        id: deployment
        uses: actions/deploy-pages@v4
